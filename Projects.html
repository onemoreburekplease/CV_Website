<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>All Projects</title>

<style>

body {
    margin: 0;
    background-color: rgb(255, 250, 225);
    font-family: monospace;
    color: rgb(38, 27, 7);
}


/* Header */
.Header_Box {
    width: 100%;
    height: 11vh;
    background-color: rgb(18, 66, 56);

    position: fixed;
    top: 0;
    left: 0;

    display: flex;
    align-items: center;
    padding: 0 2vw;

    box-sizing: border-box;
    z-index: 1000;
}

.Header_Box a {
    display: inline-block;

    padding: 0.6rem 1.4rem;

    background-color: orange;
    stroke: rgb(18, 66, 56) 2px;
    color: rgb(38, 27, 7);

    text-decoration: none;
    font-size: 0.95rem;
    font-family: monospace;

    border-radius: 2rem;

    transition: all 0.25s ease;

    position: relative;
    overflow: hidden;
}

.Header_Box a {
    display: inline-block;
    padding: 0.6rem 1.4rem;
    background-color: orange;
    color: rgb(38, 27, 7);
    text-decoration: none;
    font-size: 0.95rem;
    font-family: monospace;
    border-radius: 2rem;

    position: relative;
    overflow: hidden;

    transition: all 0.25s ease;
}

.Header_Box a::after {
    content: "";
    position: absolute;
    inset: 0;
    pointer-events: none;

    background: linear-gradient(
        to right,
        rgba(255,255,255,0) 0%,
        rgba(252, 255, 174, 0.9) 45%,
        rgba(255,255,255,0) 55%,
        rgba(255,255,255,0) 100%
    );
    transform: translateX(-100%);
    transition: transform 0.55s ease;
}

.Header_Box a:hover::after {
    transform: translateX(100%);
}

/* Hover effect (inverse like menu) */
.Header_Box a:hover {
    scale: 1.02;

}

 .Fishnet_Separator_Bottom {
    height: 35vh;

    background-image:
        linear-gradient(rgb(18, 66, 56) 2px, transparent 2px),
        linear-gradient(90deg, rgb(18, 66, 56) 2px, transparent 2px);

    background-size: 40px 40px;
    background-position: 0 0;

    opacity: 0.8;

    display: flex;
    justify-content: center;
    align-items: center;
    gap: 2rem;
    
}

 .Fishnet_Separator_Top {
    height: 35vh;

    background-image:
        linear-gradient(rgb(18, 66, 56) 2px, transparent 2px),
        linear-gradient(90deg, rgb(18, 66, 56) 2px, transparent 2px);

    background-size: 40px 40px;
    background-position: 0 0;

    opacity: 0.8;

    display: flex;
    justify-content: center;
    align-items: center;
    gap: 2rem;
    
}

.Fishnet_Button {

    padding: 16px 34px;

    background-color: orange;
    color: rgb(38, 27, 7);

    font-family: monospace;
    text-decoration: none;
    font-size: 18px;

    border-radius: 40px;

    box-shadow: 0 6px 15px rgba(0,0,0,0.25);

    transition: all 0.25s ease;

    border: rgb(13, 57, 44) 2px solid;
    
}

.Fishnet_Button:hover {

    transform: translateY(-3px);

    box-shadow: 0 12px 25px rgba(0,0,0,0.35);

    backdrop-filter: blur(4px);

    cursor: pointer;
}

                                                    /*Grid stuff*/                          

.Grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 3.5vw;
  padding: 3vw;
}

.Grid_Card {
  width: 100%;
  aspect-ratio: 1.618 / 1;

  background: orange;
  border-radius: 30px;

  cursor: pointer;
  display: block;

  border: rgb(18, 66, 56) 2px solid;

  /* initial "resting" shadow */
  box-shadow: 0 6px 0 rgb(13, 57, 44);

  transition: transform 0.2s ease, box-shadow 0.2s ease;
}

/* Hover = lifted */
.Grid_Card:hover {
  transform: translateY(-6px); /* moves UP */
  box-shadow: 0 10px 0 rgb(13, 57, 44);
}

.Grid_Card:active {
  transform: translateY(-2px);
  box-shadow: 0 6px 0 rgb(13, 57, 44);
}


</style>
</head>

<body>

<div class="Header_Box">
    <a href="Home.html">← Back to Home</a>
</div>

<section class="Fishnet_Separator_Top"> </section>

<div class="Grid">
  <a href="#" class="Grid_Card"></a>
  <a href="#" class="Grid_Card"></a>
  <a href="#" class="Grid_Card"></a>
  <a href="#" class="Grid_Card"></a>
  <a href="#" class="Grid_Card"></a>
  <a href="#" class="Grid_Card"></a>
</div>

<section class="Fishnet_Separator_Bottom">

    <a class="Fishnet_Button">Instagram</a>
    <a class="Fishnet_Button">Email</a>
    <a class="Fishnet_Button">LinkedIn</a>

</section>

<script>
document.addEventListener("DOMContentLoaded", function() {

    const sections = document.querySelectorAll(".About_Section, .About_Section_Dark" + ", .About_Section_Personal");

    setTimeout(() => {
        sections.forEach(section => {
            section.classList.add("Visible");
        });
    }, 100);

});

history.scrollRestoration = "manual";
window.scrollTo(0, 0);

document.addEventListener("DOMContentLoaded", function() {

    const section = document.getElementById("about_light");
    const image = document.querySelector(".About_Image");

    setTimeout(() => {
        image.style.opacity = "1";
        image.style.transform = "translateY(0)";
    }, 100);

    setTimeout(() => {
        section.classList.add("Visible");
    }, 350);

});
</script>

</body>
</html>
