<style>

body {
    margin: 0;
    background-color: rgb(255, 250, 225);
    font-family: monospace;
    color: rgb(38, 27, 7);
}


/* Header */
.Header_Box {
    width: 100%;
    height: 11vh;
    background-color: rgb(18, 66, 56);

    position: fixed;
    top: 0;
    left: 0;

    display: flex;
    align-items: center;
    padding: 0 2vw;

    box-sizing: border-box;
    z-index: 1000;
}
.Header_Box a {
    display: inline-block;
    padding: 0.6rem 1.4rem;
    color: rgb(38, 27, 7);
    text-decoration: none;
    font-size: 0.95rem;
    font-family: monospace;

    position: relative;
    overflow: hidden;

    transition: all 0.25s ease;
}
 .Fishnet_Separator_Bottom {
    height: 35vh;

    background-image:
        linear-gradient(rgb(18, 66, 56) 2px, transparent 2px),
        linear-gradient(90deg, rgb(18, 66, 56) 2px, transparent 2px);

    background-size: 40px 40px;
    background-position: 0 0;

    opacity: 0.8;

    display: flex;
    justify-content: center;
    align-items: center;
    gap: 2rem;
    
}

 .Fishnet_Separator_Top {
    height: 25.9vh;

    background-image:
        linear-gradient(rgb(18, 66, 56) 2px, transparent 2px),
        linear-gradient(90deg, rgb(18, 66, 56) 2px, transparent 2px);

    background-size: 40px 40px;
    background-position: 0 0;

    opacity: 1;

    display: flex;
    justify-content: center;
    align-items: center;
    gap: 2rem;
    
}

.Fishnet_Button {

    padding: 16px 34px;

    background-color: orange;
    color: rgb(38, 27, 7);

    font-family: monospace;
    text-decoration: none;
    font-size: 18px;

    border-radius: 40px;

    box-shadow: 0 6px 15px rgba(0,0,0,0.25);

    transition: all 0.25s ease;

    border: rgb(13, 57, 44) 2px solid;
    
}

.Fishnet_Button_Top {

    padding: 14px 38px;

    background-color: orange;
    color: rgb(53, 46, 33);

    font-family: monospace;
    font-size: 20px;
    font-weight: bold;

    box-shadow: 0 5px 0 rgb(13, 57, 44);

    border-radius: 80px;

    transition: all 0.3s ease;

    margin-top: 11vh;

    border: rgb(13, 57, 44) 2px solid;
    
}

.Fishnet_Button:hover {

    transform: translateY(-3px);

    box-shadow: 0 12px 25px rgba(0,0,0,0.35);

    backdrop-filter: blur(4px);

    cursor: pointer;
}

                                                    /*Grid stuff*/                          

.Grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 2vw;
  padding: 2.9vw;
}

.Grid_Card {
  width: 100%;
  aspect-ratio: 1.618 / 1;

  background: orange;
  border-radius: 25px;

  cursor: pointer;
  display: block;
  overflow: hidden;

  border: rgb(18, 66, 56) 2px solid;

  /* initial "resting" shadow */
  box-shadow: 0 6px 0 rgb(13, 57, 44);

  transition: transform 0.2s ease, box-shadow 0.2s ease;
}

.Grid_Card img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;

}
/* Hover = lifted */
.Grid_Card:hover {
  transform: translateY(-5px); /* moves UP */
  box-shadow: 0 11px 0 rgb(13, 57, 44);
}

.Grid_Card:active {
  transform: translateY(-2px);
  box-shadow: 0 6px 0 rgb(13, 57, 44);
}

                                                    /*Hamburger*/  
.Hamburger {
    width: 2.5rem;
    height: 1.6rem;

    display: flex;
    flex-direction: column;
    justify-content: space-between;

    cursor: pointer;
    transition: transform 0.3s ease;

    position: absolute;
    right: 2vw;
}
.Hamburger:hover {
    transform: scale(1.1);
}

.Hamburger div {
    height: 0.25rem;
    width: 100%;
    background-color: orange;
    border-radius: 2rem;
}
.Menu {
    position: fixed;
    top: 0;
    right: 0;

    width: 15vw;
    min-width: 220px;
    height: 100vh;

    background-color: rgb(18, 66, 56);

    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 1rem;

    padding: 2rem;

    transform: translateX(100%);
    transition: transform 0.4s ease;

    z-index: 2000;
}

/* Open state */
.Menu.open {
    transform: translateX(0);
}

/* Dark background fade */
.Menu_Overlay {
    position: fixed;
    inset: 0;

    background: rgba(22, 26, 21, 0.6);

    opacity: 0;
    pointer-events: none;

    transition: opacity 0.3s ease;

    z-index: 1500;
}

.Menu_Overlay.active {
    opacity: 1;
    pointer-events: auto;
}

/* Menu Links */

.Menu a {
    padding: 0.8rem 1.5rem;

    text-decoration: none;
    color: orange;

    font-family: monospace;
    font-size: 0.95rem;

    transition: all 0.25s ease;
    

}

.Menu a:nth-child(1):hover {
    background-color: rgb(243, 0, 0);
    color: white;
}

/* 2 */
.Menu a:nth-child(2):hover {
    background-color: rgb(255, 85, 0);
    color: black;
}

/* 3 */
.Menu a:nth-child(3):hover {
    background-color: orange;
    color: rgb(38, 27, 7);
}

/* 4 */
.Menu a:nth-child(4):hover {
    background-color: #00c853;
    color: white;
}

/* 5 */
.Menu a:nth-child(5):hover {
    background-color: #2979ff;
    color: white;
}

/* 6 */
.Menu a:nth-child(6):hover {
    background-color: #aa00ff;
    color: white;
}

/* Divider lines between menu links */
.Menu a:not(:last-child) {
    border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    padding-bottom: 0.9rem;
}

/* Optional: add spacing above next item */
.Menu a + a {
    padding-top: 0.9rem;
}

@keyframes microShake {
    0% { transform: translateX(0); }
    25% { transform: translateX(-2px); }
    50% { transform: translateX(2px); }
    75% { transform: translateX(-1px); }
    100% { transform: translateX(0); }
}

.Menu a:hover {
    animation: microShake 0.35s ease;
}

#Project_Tooltip {                                                     /* ToolTip*/
    position: fixed;
    top: 0;
    left: 0;

    padding: 14px 25px;

    background: linear-gradient(135deg, rgb(255, 240, 215) 10%, rgb(255, 250, 225) 100%);
    color: rgb(19, 19, 19);

    font-family: monospace;
    font-weight: bold;
    font-size: 16px;

    border-radius: 130px;
    border: 2px solid rgb(18, 66, 56);

    pointer-events: none; /* SUPER IMPORTANT */

    opacity: 1;
    transform: translate(20px, 10px) scale(0.52);

    transition: 
        opacity 0s ease,
        transform 0.3s ease;

    z-index: 9999;

    box-shadow: 0px 6px 0 rgb(18, 66, 56);
}  

</style>

<script>
document.addEventListener("DOMContentLoaded", function() {

    const sections = document.querySelectorAll(".About_Section, .About_Section_Dark" + ", .About_Section_Personal");


    setTimeout(() => {
        sections.forEach(section => {
            section.classList.add("Visible");
        });
    }, 100);

});

const tooltip = document.getElementById("Project_Tooltip");

history.scrollRestoration = "manual";
window.scrollTo(0, 0);

document.addEventListener("DOMContentLoaded", function() {

    const section = document.getElementById("about_light");
    const image = document.querySelector(".About_Image");

    setTimeout(() => {
        image.style.opacity = "1";
        image.style.transform = "translateY(0)";
    }, 50);

    setTimeout(() => {
        section.classList.add("Visible");
    }, 50);

});
/* --------------------------
   Menu toggle (outside DOMContentLoaded)
---------------------------*/
const hamburger = document.getElementById("hamburger");
const menu = document.getElementById("menu");
const overlay = document.getElementById("menuOverlay");

hamburger.addEventListener("click", () => {
    menu.classList.toggle("open");
    overlay.classList.toggle("active");
});

overlay.addEventListener("click", () => {
    menu.classList.remove("open");
    overlay.classList.remove("active");
});

let x = 0, y = 0;
    let targetX = 0, targetY = 0;

    document.addEventListener("mousemove", (e) => {

        targetX = e.clientX + 10;
        targetY = e.clientY + 20;

        const project = e.target.closest(".Grid_Card");

        if (project && project.dataset.title) {
            tooltip.textContent = project.dataset.title;
            tooltip.style.opacity = "1";
            tooltip.style.transform = "scale(1)";
        } else {
            tooltip.style.opacity = "0";
        }
    });

    function animateTooltip(){
        x += (targetX - x) * 0.16;
        y += (targetY - y) * 0.16;

        tooltip.style.left = x + "px";
        tooltip.style.top = y + "px";

        requestAnimationFrame(animateTooltip);
    }

    animateTooltip();
</script>
